<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Medication Taken Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {

                extend: {
                    "colors": {
                        "surface-container-highest": "#e5e2e1",

                        "on-tertiary-fixed": "#231b00",
                        "surface-container-low": "#f6f3f2",
                        "on-background": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#313030",

                    "spacing": {
                        "touch-target-min": "64px",

                    "fontFamily": {
                        "headline-md": ["Atkinson Hyperlegible Next"],
                        "label-lg": ["Atkinson Hyperlegible Next"],

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="h-full bg-surface text-on-surface flex flex-col font-body-md antialiased overflow-hidden">
<!-- Transactional Screen: Navigation Shell Suppressed -->
<main class="flex-grow flex items-center justify-center p-margin-page relative">
<!-- Subtle Background Accent -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-20 flex justify-center items-center">
<div class="w-[800px] h-[800px] bg-primary-container rounded-full blur-[120px]"></div>
</div>
<div class="relative z-10 flex flex-col items-center justify-center max-w-2xl w-full text-center space-y-gutter animate-pop-in">
<!-- Icon Container -->
<div class="mb-8 relative">
<!-- Outer pulse ring -->
<div class="absolute inset-0 bg-primary-container rounded-full animate-ping opacity-30" style="animation-duration: 3s;"></div>
<!-- Main icon circle -->
<div class="bg-primary-container text-on-primary-container rounded-full w-48 h-48 flex items-center justify-center shadow-lg animate-float relative z-10 border-4 border-surface">
<span class="material-symbols-outlined text-[96px]" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-stack-gap">
<h1 class="font-display-lg text-display-lg text-primary">Medicine Taken!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                    Great job. Your adherence is on track.
                </p>
</div>
<!-- Next Dose Info Box -->
<div class="mt-8 bg-surface-container-low border-2 border-surface-variant rounded-xl p-8 w-full max-w-md shadow-[0_8px_0_rgba(0,0,0,0.05)]">
<div class="flex items-center justify-center space-x-4 mb-2">
<span class="material-symbols-outlined text-secondary text-[32px]" data-icon="schedule" data-weight="fill">schedule</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Next Dose</h2>
</div>
<p class="font-display-lg text-display-lg text-on-surface mt-2">6:00 PM</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Evening Meds</p>
</div>
<!-- Primary Action -->
<div class="mt-12 w-full max-w-md">
<button class="w-full min-h-touch-target-min bg-secondary text-on-secondary rounded-xl font-label-lg text-label-lg uppercase tracking-wider shadow-[0_8px_15px_rgba(0,0,0,0.15)] hover:bg-secondary-container hover:text-on-secondary-container transition-colors duration-200 active:translate-y-2 active:shadow-none flex items-center justify-center">
                    Return to Dashboard
                </button>
</div>
</div>
</main>
</body></html>
